<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrackSeeds</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css-f/login.css">
</head>

<body>

    <!-- Header
    <section id="header">
        <div class="logo">
            <i class="fas fa-seedling"></i>
            <span>TrackSeeds</span>
        </div>
    </section> -->

    <!-- Login Section -->
    <section class="login-section">
        <div class="login-box">

            <!-- Left Side Image -->
            <div class="login-image">
                <img src="css-f/img/veg(page).jpg" alt="Seeds">
                <div class="overlay">
                    <h2>Welcome Back!</h2>
                    <p>Login to track your seeds and orders</p>
                </div>
            </div>

            <!-- Right Side Form -->
            <div class="login-form">
                <h3>Login to Your Account</h3>
                <p>Enter your details below</p>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password">
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox"> Remember Me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button class="login-submit-btn">Login</button>

                <p class="switch-text">
                    Don't have an account?
                    <a href="signup.html">Sign Up</a>
                </p>

                <p class="back-home">
                    <a href="index.html">
                        <i class="fas fa-arrow-left"></i> Back to Home
                    </a>
                </p>


            </div>
        </div>
    </section>

</body>

</html>
