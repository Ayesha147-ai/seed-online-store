<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TrackSeeds</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="signup.css">
</head>

<body>

    <!-- Signup Section -->
    <section class="signup-section">
        <div class="signup-box">

            <!-- Left Side Image -->
            <div class="signup-image">
                <img src="img/flow(page).jpg" alt="Seeds">
                <div class="overlay">
                    <h2>Join TrackSeeds!</h2>
                    <p>Create your account and start tracking your seeds today</p>
                </div>
            </div>

            <!-- Right Side Form -->
            <div class="signup-form">
                <h3>Create Your Account</h3>
                <p>Enter your details below</p>

                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Full Name">
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address">
                </div>

                <div class="input-group">
                    <i class="fas fa-phone"></i>
                    <input type="tel" placeholder="Phone Number">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Confirm Password">
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox"> I agree to 
                        <a href="#">Terms & Conditions</a>
                    </label>
                </div>

                <button class="signup-submit-btn">Sign Up</button>

                <p class="switch-text">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

                <p class="back-home">
                    <a href="index.html">
                        <i class="fas fa-arrow-left"></i> Back to Home
                    </a>
                </p>

            </div>
        </div>
    </section>

</body>
</html>
