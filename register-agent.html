<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Agent/Admin - TrackSeed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css-f/register-agent.css">
</head>
<body>

    <section id="header">
        <div class="logo">
            <i class="fas fa-seedling"></i>
            <span>TrackSeed</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button class="login-btn" onclick="window.location.href='login.html'">Login</button>
        <button class="Signin-btn" onclick="window.location.href='signup.html'">Sign Up</button>
    </section>

    <main class="register-main section-p1">
        <div class="info-panel">
            <div class="info-top">
                <div class="info-icon"><i class="fas fa-user-tie"></i></div>
                <h2>Join TrackSeed Network</h2>
                <p>Register to connect with the agricultural community of Pakistan.</p>
            </div>
            <div class="benefits">
                <div class="benefit-item">
                    <div class="benefit-icon"><i class="fas fa-check-circle"></i></div>
                    <div>
                        <h4>Verified Access</h4>
                        <p>Get access to your specific dashboard after verification.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-panel">
            <h3 id="form-title">Agent Registration Form</h3>
            <p class="form-subtitle">Choose your role and fill in the details.</p>

            <div class="role-selection">
                <label><input type="radio" name="userRole" value="agent" checked onclick="toggleFields()"> Register as Agent</label>
                <label><input type="radio" name="userRole" value="admin" onclick="toggleFields()"> Register as Admin</label>
            </div>

            <div class="form-group">
                <label for="fullName">Full Name <span class="required">*</span></label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullName" placeholder="e.g. Muhammad Ali">
                </div>
            </div>

            <div id="admin-only-fields" style="display: none;">
                <div class="form-group">
                    <label for="adminPass">Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="adminPass" placeholder="Set Admin Password">
                    </div>
                </div>
            </div>

            <div id="agent-only-fields">
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="you@example.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="phone" placeholder="03XX-XXXXXXX">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" id="city" placeholder="e.g. Lahore">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="province">Province <span class="required">*</span></label>
                        <div class="input-wrapper select-wrapper">
                            <i class="fas fa-map"></i>
                            <select id="province">
                                <option value="" disabled selected>Select Province</option>
                                <option>Punjab</option>
                                <option>Sindh</option>
                                <option>KPK</option>
                                <option>Balochistan</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="businessName">Business / Shop Name <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-store"></i>
                        <input type="text" id="businessName" placeholder="e.g. Ali Seed House">
                    </div>
                </div>

                <div class="form-group">
                    <label>Seed Categories You Deal In <span class="required">*</span></label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" value="vegetable"> Vegetable</label>
                        <label class="checkbox-label"><input type="checkbox" value="fruit"> Fruit</label>
                        <label class="checkbox-label"><input type="checkbox" value="flower"> Flower</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="cnic">CNIC Number <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="cnic" placeholder="XXXXX-XXXXXXX-X" maxlength="15">
                    </div>
                </div>
            </div>

            <div class="form-group terms-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="agreeTerms"> I agree to TrackSeed's <a href="#">Terms & Conditions</a>
                </label>
            </div>

            <button class="submit-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Submit Registration
            </button>
        </div>
    </main>

    <script src="js-f/register-agent.js"></script>
</body>
</html>
